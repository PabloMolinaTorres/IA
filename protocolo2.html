<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>WIDA Protocolo 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%238fca00'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='Arial,sans-serif' font-size='38' font-weight='900' fill='white'%3EW%3C/text%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700,900" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --card2: #f1f3f5;
      --text: #1f2933;
      --muted: #6b7280;
      --border: #e5e7eb;
      --greenFalabella: #8fca00;
      --greenDark: #6fa800;
      --red: #ef4444;
      --orange: #fb923c;
      --yellow: #facc15;
      --green: #22c55e;
      --blue: #3b82f6;
      --shadow: 0 8px 24px rgba(0, 0, 0, .07);
      --radius: 18px;
    }

    body.dark {
      --bg: #060606;
      --card: #111111;
      --card2: #1b1b1b;
      --text: #f5f5f5;
      --muted: #a1a1aa;
      --border: #2a2a2a;
      --shadow: 0 8px 24px rgba(0, 0, 0, .35);
    }

    * { box-sizing: border-box; font-family: 'Lato', sans-serif; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    button, input, select, textarea { font-family: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 3px 18px rgba(0, 0, 0, .04);
    }

    .topbar-inner {
      max-width: 1450px;
      margin: 0 auto;
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .logo-box {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--greenFalabella), #c9f000);
      color: white;
      font-weight: 900;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 20px rgba(143, 202, 0, .25);
    }

    .brand h1 { margin: 0; font-size: 19px; font-weight: 900; line-height: 1.1; }
    .brand small { display: block; color: var(--muted); margin-top: 2px; font-size: 12px; }
    .version {
      display: inline-flex;
      margin-left: 6px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(143, 202, 0, .13);
      color: var(--greenDark);
      font-size: 11px;
      font-weight: 900;
    }

    .top-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .module-nav { display: inline-flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .module-link {
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 13px;
      font-weight: 900;
      font-size: 13px;
      white-space: nowrap;
    }

    .module-link.active { background: var(--greenFalabella); border-color: var(--greenFalabella); color: white; }
    .user-select {
      min-width: 190px;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 13px;
      outline: none;
      font-weight: 700;
    }

    .role-badge {
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 900;
      border: 1px solid transparent;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: .04em;
      background: rgba(143, 202, 0, .14);
      color: var(--greenDark);
      border-color: rgba(143, 202, 0, .28);
    }

    .theme-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      cursor: pointer;
      font-size: 18px;
    }

    .main { max-width: 1450px; margin: 0 auto; padding: 22px; }
    .hidden { display: none !important; }

    .lock-message {
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 22px;
      text-align: center;
      color: var(--muted);
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      font-weight: 700;
      line-height: 1.45;
    }

    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .tab {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 900;
    }
    .tab.active { background: var(--greenFalabella); color: white; border-color: var(--greenFalabella); }
    .tab:disabled { opacity: .45; cursor: not-allowed; }

    .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 18px; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); }
    .stat small { color: var(--muted); font-size: 11px; font-weight: 900; text-transform: uppercase; }
    .stat strong { display: block; font-size: 25px; margin-top: 5px; }

    .view { display: none; }
    .view.active { display: block; }

    .layout { display: grid; grid-template-columns: 390px 1fr; gap: 16px; align-items: start; }
    .list-panel, .detail-panel, .master-panel, .manual-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .manual-panel { padding: 16px; margin-bottom: 18px; overflow: visible; }
    .manual-title { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .manual-title h2 { margin: 0; font-size: 18px; }
    .manual-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; color: var(--muted); font-weight: 900; text-transform: uppercase; letter-spacing: .04em; }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
      font-weight: 700;
    }
    .field textarea { min-height: 86px; resize: vertical; line-height: 1.35; }

    .panel-title {
      padding: 15px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 900;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .panel-title-actions { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .search-input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
      font-weight: 700;
    }

    .list-search { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--card); }
    .case-list { max-height: calc(100vh - 330px); overflow-y: auto; }
    .case-item { padding: 13px 16px; border-bottom: 1px solid var(--border); cursor: pointer; display: grid; gap: 7px; }
    .case-item:hover, .case-item.active { background: rgba(143, 202, 0, .08); }
    .case-item-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .case-code { font-size: 16px; font-weight: 900; }
    .case-meta { color: var(--muted); font-size: 12px; font-weight: 700; line-height: 1.4; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 900;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .status { background: var(--card2); color: var(--muted); border-color: var(--border); }
    .status-pendiente { background: rgba(107, 114, 128, .16); color: var(--muted); border-color: rgba(107, 114, 128, .32); }
    .status-trabajo { background: rgba(59, 130, 246, .13); color: var(--blue); border-color: rgba(59, 130, 246, .25); }
    .status-revision { background: rgba(250, 204, 21, .17); color: #ca8a04; border-color: rgba(250, 204, 21, .32); }
    .status-rechazado { background: rgba(239, 68, 68, .13); color: var(--red); border-color: rgba(239, 68, 68, .25); }
    .status-aprobado { background: rgba(34, 197, 94, .14); color: var(--green); border-color: rgba(34, 197, 94, .28); }
    .status-descargado { background: rgba(34, 197, 94, .22); color: var(--green); border-color: rgba(34, 197, 94, .36); }
    .status-descartado { background: rgba(107, 114, 128, .16); color: var(--muted); border-color: rgba(107, 114, 128, .32); }

    .detail-content { padding: 18px; }
    .empty { padding: 30px; color: var(--muted); text-align: center; font-weight: 700; }
    .detail-header { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 14px; flex-wrap: wrap; }
    .detail-header h2 { margin: 0; font-size: 24px; }
    .detail-header small { display: block; margin-top: 4px; color: var(--muted); font-weight: 700; }

    .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
    .info-box { background: var(--card2); border: 1px solid var(--border); border-radius: 14px; padding: 12px; }
    .info-box small { display: block; color: var(--muted); font-size: 11px; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
    .info-box span { white-space: pre-wrap; line-height: 1.35; font-size: 14px; font-weight: 800; }

    .section-block { background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
    .section-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    .section-head strong { font-size: 14px; font-weight: 900; }
    .section-head small { color: var(--muted); font-size: 12px; font-weight: 700; }

    .sku-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 8px; }
    .sku-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 10px; display: grid; gap: 5px; }
    .sku-card strong { font-size: 13px; }
    .sku-card span { color: var(--muted); font-size: 12px; font-weight: 700; }
    .view-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .view-tag { border-radius: 999px; padding: 4px 7px; background: var(--card2); border: 1px solid var(--border); font-size: 10px; font-weight: 900; color: var(--muted); }
    .view-ok { background: rgba(34, 197, 94, .14); color: var(--green); border-color: rgba(34, 197, 94, .28); }
    .view-review { background: rgba(250, 204, 21, .17); color: #ca8a04; border-color: rgba(250, 204, 21, .32); }
    .view-bad { background: rgba(239, 68, 68, .13); color: var(--red); border-color: rgba(239, 68, 68, .25); }

    .spec-list { display: grid; gap: 10px; }
    .spec-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px; display: grid; gap: 8px; }
    .spec-card h3 { margin: 0; font-size: 15px; }
    .spec-card p { margin: 0; color: var(--muted); line-height: 1.4; white-space: pre-wrap; font-weight: 700; }
    .spec-structured { display: grid; gap: 10px; margin-top: 4px; }
    .spec-chip-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .spec-chip { border: 1px solid var(--border); background: var(--card2); border-radius: 999px; padding: 7px 10px; font-size: 12px; font-weight: 900; color: var(--text); }
    .spec-table { width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 14px; border: 1px solid var(--border); }
    .spec-table th, .spec-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); text-align: left; font-size: 12px; vertical-align: top; }
    .spec-table th { width: 42%; color: var(--muted); background: var(--card2); font-weight: 900; text-transform: uppercase; letter-spacing: .03em; }
    .spec-table tr:last-child th, .spec-table tr:last-child td { border-bottom: 0; }
    .spec-raw { margin-top: 8px; }
    .spec-raw summary { cursor: pointer; color: var(--muted); font-size: 12px; font-weight: 900; }
    .spec-raw p { margin-top: 8px; }
    .spec-images { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
    .spec-images img { width: 100%; aspect-ratio: 1 / 1; object-fit: contain; background: white; border: 1px solid var(--border); border-radius: 12px; cursor: zoom-in; }

    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--greenFalabella); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--greenDark); }
    .btn-soft { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-blue { background: var(--blue); color: white; }
    .btn-red { background: var(--red); color: white; }
    .btn-small { padding: 8px 10px; font-size: 12px; border-radius: 10px; }

    .upload-box {
      border: 2px dashed var(--border);
      background: var(--card2);
      border-radius: var(--radius);
      padding: 34px 20px;
      text-align: center;
      cursor: pointer;
      display: block;
      transition: border-color .15s ease, background .15s ease, transform .15s ease;
      margin-bottom: 14px;
    }
    .upload-box:hover, .upload-box.drag-over { border-color: var(--greenFalabella); background: rgba(143, 202, 0, .08); transform: translateY(-1px); }
    .upload-box strong { display: block; font-size: 17px; margin-bottom: 6px; }
    .upload-box small { color: var(--muted); line-height: 1.4; }
    .input-file { display: none; }

    .match-table-wrap { width: 100%; overflow: auto; }
    .table { width: 100%; border-collapse: collapse; min-width: 760px; }
    .table th, .table td { padding: 11px 10px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; font-size: 13px; }
    .table th { background: var(--card2); color: var(--muted); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; position: sticky; top: 0; z-index: 1; }
    .table tr:hover td { background: rgba(143, 202, 0, .05); }
    .muted { color: var(--muted); font-weight: 700; }

    .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .image-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: grid; }
    .image-card-head { padding: 10px 12px; border-bottom: 1px solid var(--border); background: var(--card2); display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: 12px; font-weight: 900; color: var(--muted); }
    .image-card img { width: 100%; aspect-ratio: 1 / 1; object-fit: contain; background: white; cursor: zoom-in; }
    .image-card-body { padding: 12px; display: grid; gap: 8px; }

    .review-sku-group {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card2);
      padding: 14px;
      margin-bottom: 16px;
    }
    .review-sku-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .review-sku-head strong { font-size: 16px; font-weight: 900; }
    .review-sku-head small { color: var(--muted); font-weight: 900; }
    .review-image-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .image-zoom-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: white;
      overflow: hidden;
      cursor: zoom-in;
      border-bottom: 1px solid var(--border);
      --zoom-left: 50%;
      --zoom-top: 50%;
      --zoom-size: 300px;
      --zoom-image: none;
      --zoom-bg-size: 100% 100%;
      --zoom-bg-position: 50% 50%;
    }
    .image-zoom-frame img {
      width: 100%;
      height: 100%;
      aspect-ratio: auto;
      object-fit: contain;
      background: white;
      display: block;
    }
    .image-zoom-frame::after {
      content: "";
      position: absolute;
      left: var(--zoom-left);
      top: var(--zoom-top);
      width: var(--zoom-size);
      height: var(--zoom-size);
      transform: translate(-50%, -50%);
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, .95);
      box-shadow: 0 12px 34px rgba(0, 0, 0, .28), inset 0 0 0 1px rgba(0, 0, 0, .18);
      background-image: var(--zoom-image);
      background-repeat: no-repeat;
      background-size: var(--zoom-bg-size);
      background-position: var(--zoom-bg-position);
      opacity: 0;
      pointer-events: none;
      z-index: 6;
    }
    .image-zoom-frame:hover::after { opacity: 1; }

    .reject-box textarea { width: 100%; min-height: 80px; resize: vertical; border: 1px solid var(--border); background: var(--card2); color: var(--text); border-radius: 12px; padding: 10px; outline: none; line-height: 1.35; }

    .master-filter-bar { padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--card); display: grid; grid-template-columns: minmax(260px, 1fr) auto auto; gap: 8px; align-items: center; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, .72);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .modal-content {
      width: min(96vw, 1280px);
      max-height: 92vh;
      overflow: auto;
      background: var(--card);
      color: var(--text);
      border-radius: 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .modal-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; position: sticky; top: 0; background: var(--card); z-index: 2; }
    .modal-head strong { font-size: 16px; }
    .modal-body { padding: 16px; }
    .modal-close { width: 36px; height: 36px; border-radius: 999px; border: 1px solid var(--border); background: var(--card2); color: var(--text); cursor: pointer; font-size: 20px; font-weight: 900; }
    .history-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .history-section { display: grid; gap: 12px; }

    .image-modal { position: fixed; inset: 0; z-index: 110; background: rgba(0,0,0,.84); display: grid; place-items: center; padding: 24px; }
    .image-modal img { max-width: 95vw; max-height: 90vh; object-fit: contain; background: white; border-radius: 14px; }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 120;
      background: #111827;
      color: white;
      padding: 13px 15px;
      border-radius: 14px;
      box-shadow: 0 15px 35px rgba(0,0,0,.25);
      font-weight: 900;
      display: none;
      max-width: 360px;
    }
    body.dark .toast { background: white; color: #111; }

    @media (max-width: 1000px) {
      .topbar-inner { align-items: flex-start; flex-direction: column; }
      .top-right { width: 100%; justify-content: space-between; }
      .module-nav { width: 100%; }
      .module-link { flex: 1; text-align: center; }
      .layout, .manual-grid, .info-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .case-list { max-height: none; }
      .master-filter-bar { grid-template-columns: 1fr; }
    }

    @media (max-width: 900px) {
      .review-image-grid { grid-template-columns: 1fr; }
    }

  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="logo-box">P2</div>
        <div>
          <h1>WIDA Protocolo 2 <span class="version">V1.6</span></h1>
          <small>Falabella Chile</small>
        </div>
      </div>
      <div class="top-right">
        <nav class="module-nav" aria-label="Módulos">
          <a class="module-link" href="./index.html">WIDA</a>
          <a class="module-link" href="./medidas.html">Medidas</a>
          <a class="module-link active" href="./protocolo2.html">Protocolo 2</a>
        </nav>
        <select id="currentUser" class="user-select" onchange="handleUserChange()">
          <option value="">Seleccionar usuario</option>
          <option>Pablo</option>
          <option>Mylena</option>
          <option>Fernanda</option>
          <option>Fernando</option>
          <option>Marcos</option>
          <option>Sebastian</option>
          <option>Kathe</option>
          <option>Cindy</option>
          <option>Daniela</option>
          <option>Cathy</option>
        </select>
        <span id="userRoleBadge" class="role-badge hidden"></span>
        <button id="themeBtn" class="theme-btn" onclick="toggleTheme()" title="Modo oscuro">🌙</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="lockMessage" class="lock-message">Selecciona usuario para comenzar.</div>

    <section id="appContent" class="hidden">
      <div class="tabs" id="tabs"></div>

      <div class="stats">
        <div class="stat"><small>Casos pendientes</small><strong id="statPending">0</strong></div>
        <div class="stat"><small>En trabajo</small><strong id="statWork">0</strong></div>
        <div class="stat"><small>En revisión</small><strong id="statReview">0</strong></div>
        <div class="stat"><small>Completados</small><strong id="statCompleted">0</strong></div>
        <div class="stat"><small>Imágenes activas</small><strong id="statImages">0</strong></div>
      </div>

      <section id="viewWork" class="view"></section>
      <section id="viewUpload" class="view"></section>
      <section id="viewReview" class="view"></section>
      <section id="viewMaster" class="view"></section>
      <section id="viewSpecs" class="view"></section>
    </section>
  </main>

  <div id="historyModal" class="modal hidden"></div>
  <div id="imageModal" class="image-modal hidden" onclick="closeImageModal()"></div>
  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      updateDoc,
      deleteDoc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import {
      getStorage,
      ref as storageRef,
      uploadBytes,
      getDownloadURL,
      deleteObject
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDmzE2YLMHuHNkBEnE3J7GGVA4RFUx3rpw",
      authDomain: "flujo-ia-auto.firebaseapp.com",
      projectId: "flujo-ia-auto",
      storageBucket: "flujo-ia-auto.firebasestorage.app",
      messagingSenderId: "171949468816",
      appId: "1:171949468816:web:712d793918792d731b7c15"
    };

    const THEME_KEY = "flujo_ia_theme";
    const SAVED_USER_KEY = "flujo_ia_current_user";
    const BASE_DOCUMENT_TITLE = "WIDA Protocolo 2";

    const CASE_COLLECTION = "flujo_ia_protocolo2_casos";
    const IMAGE_COLLECTION = "flujo_ia_protocolo2_imagenes";
    const SPEC_COLLECTION = "flujo_ia_protocolo2_especificaciones";
    const STORAGE_ROOT = "flujo-ia/protocolo2";
    const MAX_UPLOAD_SIZE_BYTES = 15 * 1024 * 1024;
    const ALLOWED_UPLOAD_EXTENSIONS = ["jpg", "jpeg", "png", "webp", "avif"];
    const ALLOWED_UPLOAD_MIME_TYPES = ["image/jpeg", "image/png", "image/webp", "image/avif"];

    const ROLES = { ADMIN: "admin", RETOCADOR: "retocador", REVISOR: "revisor" };
    const ROLE_LABELS = { [ROLES.ADMIN]: "Admin", [ROLES.RETOCADOR]: "Retocador", [ROLES.REVISOR]: "Revisor" };
    const USER_ROLES = {
      Pablo: ROLES.ADMIN,
      Mylena: ROLES.RETOCADOR,
      Fernanda: ROLES.RETOCADOR,
      Fernando: ROLES.RETOCADOR,
      Marcos: ROLES.RETOCADOR,
      Sebastian: ROLES.RETOCADOR,
      Kathe: ROLES.RETOCADOR,
      Cindy: ROLES.REVISOR,
      Daniela: ROLES.REVISOR,
      Cathy: ROLES.REVISOR
    };
    const ROLE_TABS = {
      [ROLES.ADMIN]: ["work", "upload", "review", "master", "specs"],
      [ROLES.RETOCADOR]: ["work", "upload", "master", "specs"],
      [ROLES.REVISOR]: ["work", "review", "master", "specs"]
    };

    const TAB_LABELS = {
      work: "SKU a trabajar",
      upload: "Subir trabajado",
      review: "Revisión",
      master: "Master",
      specs: "Especificaciones"
    };

    const STATUS = {
      PENDIENTE: "Pendiente",
      TRABAJO: "En trabajo",
      REVISION: "En revisión",
      RECHAZADO: "Pendiente corrección",
      COMPLETADO: "Completado",
      DESCARGADO: "Descargado",
      DESCARTADO: "Descartado"
    };

    const IMG_STATUS = {
      REVISION: "En revisión",
      APROBADO: "Aceptado",
      RECHAZADO: "Rechazado",
      DESCARTADO: "Descartado"
    };

    let db = null;
    let storage = null;
    let firebaseReady = false;
    let cases = [];
    let images = [];
    let specs = [];
    let activeTab = "work";
    let selectedWorkId = "";
    let selectedUploadId = "";
    let selectedReviewId = "";
    let masterSearch = "";
    let workSearch = "";
    let historyTab = "accepted";
    let uploadProcessing = false;
    let unsubscribeCases = null;
    let unsubscribeImages = null;
    let unsubscribeSpecs = null;

    function currentUser() { return document.getElementById("currentUser")?.value || ""; }
    function currentRole() { return USER_ROLES[currentUser()] || ""; }
    function isAdmin() { return currentRole() === ROLES.ADMIN; }
    function isReviewer() { return currentRole() === ROLES.REVISOR || isAdmin(); }
    function canAccess(tab) { return (ROLE_TABS[currentRole()] || []).includes(tab); }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function encodeForInline(value) { return encodeURIComponent(String(value ?? "")); }
    function normalizeText(value) {
      return String(value ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim()
        .toLowerCase();
    }
    function normalizeSku(value) { return String(value ?? "").trim().replace(/\.0$/, "").toUpperCase(); }
    function normalizeBrand(value) { return String(value ?? "").trim().toUpperCase(); }
    function safeFileName(value) {
      return String(value || "archivo")
        .replace(/[\\/:*?"<>|#%{}$!'@+`=]/g, "_")
        .replace(/\s+/g, "_")
        .replace(/_+/g, "_")
        .replace(/^_+|_+$/g, "") || "archivo";
    }
    function normalizeFolderPath(value) {
      return String(value || "")
        .replace(/\\/g, "/")
        .split("/")
        .map(part => safeFileName(part.trim()))
        .filter(Boolean)
        .join("/");
    }
    function getFileFolderPath(file) {
      const relative = String(file?.webkitRelativePath || "").replace(/\\/g, "/");
      if (!relative || !relative.includes("/")) return "";
      return normalizeFolderPath(relative.split("/").slice(0, -1).join("/"));
    }
    function deliveryKey(sku, view, folderPath = "") {
      return `${normalizeFolderPath(folderPath)}__${normalizeSku(sku)}__${String(view || "").trim()}`;
    }
    function imageDeliveryKey(img) {
      return deliveryKey(img?.sku, img?.view, img?.folderPath || "");
    }
    function deliveryDisplay(folderPath, sku, view) {
      const folder = normalizeFolderPath(folderPath || "");
      return `${folder ? `${folder}/` : ""}${normalizeSku(sku)}_${String(view || "").trim()}`;
    }
    function dateStamp() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      return `${pad(d.getDate())}-${pad(d.getMonth() + 1)}_${pad(d.getHours())}${pad(d.getMinutes())}`;
    }
    function formatDate(value) {
      if (!value) return "-";
      try { return new Date(value).toLocaleString("es-CL", { dateStyle: "short", timeStyle: "short" }); }
      catch { return String(value); }
    }
    function addDaysIso(days) {
      const d = new Date();
      d.setDate(d.getDate() + days);
      return d.toISOString();
    }
    function splitSearchTerms(value) {
      return String(value || "")
        .split(/[\s,;]+/g)
        .map(item => normalizeSku(item))
        .filter(Boolean);
    }

    function caseRef(id) { return doc(db, CASE_COLLECTION, String(id)); }
    function imageRef(id) { return doc(db, IMAGE_COLLECTION, String(id)); }
    function specRef(id) { return doc(db, SPEC_COLLECTION, String(id)); }

    function loadTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved === "dark") document.body.classList.add("dark");
      document.getElementById("themeBtn").textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
    }
    function toggleTheme() {
      document.body.classList.toggle("dark");
      localStorage.setItem(THEME_KEY, document.body.classList.contains("dark") ? "dark" : "light");
      document.getElementById("themeBtn").textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
    }

    function initFirebase() {
      try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        storage = getStorage(app);
        firebaseReady = true;
        subscribeData();
      } catch (err) {
        console.error(err);
        firebaseReady = false;
        document.getElementById("lockMessage").textContent = "No se pudo iniciar Firebase.";
      }
    }

    function subscribeData() {
      if (!firebaseReady) return;
      if (unsubscribeCases) unsubscribeCases();
      if (unsubscribeImages) unsubscribeImages();
      if (unsubscribeSpecs) unsubscribeSpecs();

      unsubscribeCases = onSnapshot(collection(db, CASE_COLLECTION), snap => {
        cases = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        cases.sort((a, b) => String(b.createdAt || "").localeCompare(String(a.createdAt || "")));
        refresh();
      }, err => console.error(err));

      unsubscribeImages = onSnapshot(collection(db, IMAGE_COLLECTION), snap => {
        images = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        images.sort((a, b) => String(a.sku || "").localeCompare(String(b.sku || "")) || String(a.view || "").localeCompare(String(b.view || "")));
        refresh();
      }, err => console.error(err));

      unsubscribeSpecs = onSnapshot(collection(db, SPEC_COLLECTION), snap => {
        specs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        specs.sort((a, b) => String(a.brand || "").localeCompare(String(b.brand || "")));
        refresh();
      }, err => console.error(err));
    }

    function handleUserChange() {
      const user = currentUser();
      if (user) localStorage.setItem(SAVED_USER_KEY, user);
      const role = currentRole();
      const badge = document.getElementById("userRoleBadge");
      badge.textContent = role ? ROLE_LABELS[role] : "";
      badge.classList.toggle("hidden", !role);
      const allowed = role && firebaseReady;
      document.getElementById("lockMessage").classList.toggle("hidden", allowed);
      document.getElementById("appContent").classList.toggle("hidden", !allowed);
      if (!allowed) {
        document.getElementById("lockMessage").textContent = user ? "Usuario sin permisos en Protocolo 2." : "Selecciona usuario para comenzar.";
        return;
      }
      const tabs = ROLE_TABS[role] || [];
      if (!tabs.includes(activeTab)) activeTab = tabs[0] || "work";
      refresh();
    }

    function initUser() {
      const saved = localStorage.getItem(SAVED_USER_KEY);
      const select = document.getElementById("currentUser");
      if (saved && [...select.options].some(option => option.value === saved || option.textContent === saved)) select.value = saved;
      handleUserChange();
    }

    function setTab(tab) {
      if (!canAccess(tab)) return;
      activeTab = tab;
      refresh();
    }

    function refresh() {
      if (!firebaseReady) return;
      const role = currentRole();
      const allowed = role && firebaseReady;
      document.getElementById("lockMessage").classList.toggle("hidden", allowed);
      document.getElementById("appContent").classList.toggle("hidden", !allowed);
      if (!allowed) return;
      renderTabs();
      renderStats();
      renderActiveView();
    }

    function renderTabs() {
      const tabs = ROLE_TABS[currentRole()] || [];
      document.getElementById("tabs").innerHTML = tabs.map(tab => `
        <button class="tab ${activeTab === tab ? "active" : ""}" onclick="setTab('${tab}')">${TAB_LABELS[tab]}</button>
      `).join("");
    }

    function getCaseImages(caseId) { return images.filter(img => img.caseId === caseId); }
    function getActiveImages(caseId) { return getCaseImages(caseId).filter(img => img.active !== false); }
    function getApprovedImages(caseId) { return getCaseImages(caseId).filter(img => img.status === IMG_STATUS.APROBADO); }
    function getRevisionImages(caseId) { return getCaseImages(caseId).filter(img => img.status === IMG_STATUS.REVISION && img.active !== false); }
    function getRejectedImages(caseId) { return getCaseImages(caseId).filter(img => img.status === IMG_STATUS.RECHAZADO); }

    function renderStats() {
      const pending = cases.filter(c => c.estado === STATUS.PENDIENTE || c.estado === STATUS.RECHAZADO).length;
      const work = cases.filter(c => c.estado === STATUS.TRABAJO).length;
      const review = cases.filter(c => c.estado === STATUS.REVISION).length;
      const completed = cases.filter(c => c.estado === STATUS.COMPLETADO || c.estado === STATUS.DESCARGADO).length;
      const activeImages = images.filter(img => img.active !== false).length;
      document.getElementById("statPending").textContent = pending;
      document.getElementById("statWork").textContent = work;
      document.getElementById("statReview").textContent = review;
      document.getElementById("statCompleted").textContent = completed;
      document.getElementById("statImages").textContent = activeImages;
      document.title = `${BASE_DOCUMENT_TITLE} (${pending + work + review})`;
    }

    function renderActiveView() {
      ["work", "upload", "review", "master", "specs"].forEach(tab => {
        document.getElementById(`view${cap(tab)}`).classList.toggle("active", activeTab === tab);
      });
      if (activeTab === "work") renderWork();
      if (activeTab === "upload") renderUpload();
      if (activeTab === "review") renderReview();
      if (activeTab === "master") renderMaster();
      if (activeTab === "specs") renderSpecs();
    }
    function cap(tab) { return tab.charAt(0).toUpperCase() + tab.slice(1); }

    function statusPill(status) {
      const key = normalizeText(status).replace(/\s+/g, "-");
      const cls = status === STATUS.TRABAJO ? "status-trabajo"
        : status === STATUS.REVISION ? "status-revision"
        : status === STATUS.RECHAZADO ? "status-rechazado"
        : status === STATUS.COMPLETADO ? "status-aprobado"
        : status === STATUS.DESCARGADO ? "status-descargado"
        : status === STATUS.DESCARTADO ? "status-descartado"
        : "status-pendiente";
      return `<span class="pill ${cls}">${escapeHtml(status || STATUS.PENDIENTE)}</span>`;
    }

    function caseMatchesTerms(record, terms) {
      if (!terms.length) return true;
      const skuSet = new Set((record.skus || []).map(row => normalizeSku(row.sku)));
      const haystack = [record.caseNumber, record.editor, ...(record.brands || [])].map(normalizeSku);
      return terms.some(term => skuSet.has(term) || haystack.some(value => value.includes(term)));
    }

    function getWorkCases() {
      const terms = splitSearchTerms(workSearch);
      const role = currentRole();
      return cases.filter(record => {
        const statusOk = [STATUS.PENDIENTE, STATUS.TRABAJO, STATUS.RECHAZADO].includes(record.estado || STATUS.PENDIENTE);
        if (!statusOk) return false;
        if (role === ROLES.RETOCADOR && record.editor && record.editor !== currentUser()) return false;
        return caseMatchesTerms(record, terms);
      });
    }

    function renderCaseItem(record, selectedId, selectFn) {
      const activeCount = getActiveImages(record.id).length;
      const revCount = getRevisionImages(record.id).length;
      const rejected = (record.pendingRejected || []).length;
      return `
        <div class="case-item ${record.id === selectedId ? "active" : ""}" onclick="${selectFn}('${encodeForInline(record.id)}')">
          <div class="case-item-top">
            <span class="case-code">Caso ${escapeHtml(record.caseNumber || record.id)}</span>
            ${statusPill(record.estado || STATUS.PENDIENTE)}
          </div>
          <div class="case-meta">
            ${(record.brands || []).join(", ") || "Sin marca"}<br>
            ${(record.skus || []).length} SKU · ${activeCount} img · ${revCount} rev · ${rejected} faltante(s)<br>
            ${record.editor ? `Post: ${escapeHtml(record.editor)}` : "Sin retocador"}
          </div>
        </div>
      `;
    }

    function renderWork() {
      const list = getWorkCases();
      if (!selectedWorkId || !list.some(record => record.id === selectedWorkId)) selectedWorkId = list[0]?.id || "";
      document.getElementById("viewWork").innerHTML = `
        ${isReviewer() ? renderCaseUploadPanel() : ""}
        <div class="layout">
          <div class="list-panel">
            <div class="panel-title">
              <span>Casos</span>
              <span class="pill status">${list.length}</span>
            </div>
            <div class="list-search">
              <input class="search-input" value="${escapeHtml(workSearch)}" oninput="setWorkSearch(this.value)" placeholder="Buscar SKU(s), caso o marca" />
            </div>
            <div class="case-list">
              ${list.length ? list.map(record => renderCaseItem(record, selectedWorkId, "selectWorkCase")).join("") : `<div class="empty">Sin casos.</div>`}
            </div>
          </div>
          <div class="detail-panel"><div class="detail-content" id="workDetail"></div></div>
        </div>
      `;
      renderWorkDetail();
    }

    function renderCaseUploadPanel() {
      return `
        <div class="manual-panel">
          <div class="manual-title">
            <h2>Cargar caso</h2>
            <div class="actions">
              <button class="btn btn-soft" onclick="downloadCaseTemplate()">Plantilla</button>
            </div>
          </div>
          <label class="upload-box" for="caseExcelInput">
            <strong>Subir Excel del caso</strong>
            <small>El número de caso se lee desde el nombre del archivo. SKU columna J, Marca columna G.</small>
          </label>
          <input id="caseExcelInput" class="input-file" type="file" accept=".xlsx,.xls,.csv" onchange="handleCaseExcel(event)" />
        </div>
      `;
    }

    function selectWorkCase(idRaw) {
      selectedWorkId = decodeURIComponent(idRaw || "");
      renderWork();
    }
    function setWorkSearch(value) { workSearch = value; renderWork(); }

    function renderWorkDetail() {
      const el = document.getElementById("workDetail");
      if (!el) return;
      const record = cases.find(c => c.id === selectedWorkId);
      if (!record) { el.innerHTML = `<div class="empty">Selecciona un caso.</div>`; return; }
      const skus = record.skus || [];
      const brands = record.brands || [];
      const pendingRejected = record.pendingRejected || [];
      const active = getActiveImages(record.id);
      const approved = getApprovedImages(record.id);
      const revision = getRevisionImages(record.id);
      const rejected = getRejectedImages(record.id);
      el.innerHTML = `
        <div class="detail-header">
          <div><h2>Caso ${escapeHtml(record.caseNumber || record.id)}</h2><small>${escapeHtml(brands.join(", ") || "Sin marca")} · ${skus.length} SKU</small></div>
          ${statusPill(record.estado || STATUS.PENDIENTE)}
        </div>
        <div class="info-grid">
          <div class="info-box"><small>Post</small><span>${escapeHtml(record.editor || "Sin asignar")}</span></div>
          <div class="info-box"><small>SKU</small><span>${skus.length}</span></div>
          <div class="info-box"><small>Activas</small><span>${active.length}</span></div>
          <div class="info-box"><small>Faltantes</small><span>${pendingRejected.length}</span></div>
        </div>
        ${pendingRejected.length ? `
          <div class="section-block">
            <div class="section-head"><div><strong>Correcciones pendientes</strong><br><small>SKU_VISTA rechazados</small></div></div>
            <div class="view-tags">${pendingRejected.map(item => `<span class="view-tag view-bad">${escapeHtml(deliveryDisplay(item.folderPath, item.sku, item.view))}</span>`).join("")}</div>
          </div>` : ""}
        <div class="section-block">
          <div class="section-head"><div><strong>Especificaciones por marca</strong><br><small>Referencia para post producción</small></div></div>
          ${renderSpecsForBrands(brands)}
        </div>
        <div class="section-block">
          <div class="section-head"><div><strong>SKU del caso</strong><br><small>Marca y estado por vistas</small></div></div>
          <div class="sku-grid">${skus.map(row => renderSkuCard(record, row)).join("")}</div>
        </div>
        <div class="actions">
          ${canTakeCase(record) ? `<button class="btn btn-primary" onclick="takeCase('${encodeForInline(record.id)}')">Tomar caso</button>` : ""}
          ${canOpenUpload(record) ? `<button class="btn btn-blue" onclick="openUploadForCase('${encodeForInline(record.id)}')">Subir trabajado</button>` : ""}
          ${isAdmin() ? `<button class="btn btn-red" onclick="deleteCase('${encodeForInline(record.id)}')">Eliminar caso</button>` : ""}
        </div>
      `;
    }

    function renderSpecsForBrands(brands) {
      const list = brands.map(brand => specs.find(spec => normalizeBrand(spec.brand) === normalizeBrand(brand))).filter(Boolean);
      if (!list.length) return `<div class="empty">Sin especificaciones cargadas para esta marca.</div>`;
      return `<div class="spec-list">${list.map(renderSpecCard).join("")}</div>`;
    }
    function renderSpecCard(spec) {
      return `
        <div class="spec-card">
          <h3>${escapeHtml(spec.brand)}</h3>
          ${renderSpecContent(spec)}
          ${spec.images?.length ? `<div class="spec-images">${spec.images.map(img => `<img src="${escapeHtml(img.url)}" alt="${escapeHtml(img.name || spec.brand)}" onclick="openImageModal('${encodeForInline(img.url)}')">`).join("")}</div>` : ""}
        </div>`;
    }

    function renderSpecContent(spec) {
      const parsed = spec.parsed || parseSpecNotes(spec.notes || "");
      const chips = [];
      if (parsed.format) chips.push(parsed.format);
      if (parsed.background) chips.push(`Fondo: ${parsed.background}`);
      if (parsed.shadow) chips.push(`Sombra: ${parsed.shadow}`);
      if (parsed.view) chips.push(`Vista: ${parsed.view}`);

      const details = Object.entries(parsed.details || {}).filter(([, value]) => String(value || "").trim());
      const chipsHtml = chips.length ? `<div class="spec-chip-list">${chips.map(item => `<span class="spec-chip">${escapeHtml(item)}</span>`).join("")}</div>` : "";
      const tableHtml = details.length ? `
        <table class="spec-table">
          <tbody>
            ${details.map(([label, value]) => `<tr><th>${escapeHtml(label)}</th><td>${escapeHtml(value)}</td></tr>`).join("")}
          </tbody>
        </table>` : "";
      const rawHtml = spec.notes ? `
        <details class="spec-raw">
          <summary>Ver texto original</summary>
          <p>${escapeHtml(spec.notes)}</p>
        </details>` : "";

      if (!chipsHtml && !tableHtml) return `<p>${escapeHtml(spec.notes || "Sin texto")}</p>`;
      return `<div class="spec-structured">${chipsHtml}${tableHtml}${rawHtml}</div>`;
    }

    function parseSpecNotes(text) {
      const raw = String(text || "").replace(/\r/g, "").trim();
      const lines = raw.split("\n").map(line => line.trim()).filter(Boolean);
      const parsed = { format: "", background: "", shadow: "", view: "", details: {} };
      const knownDetailKeys = new Set([
        "dimensiones",
        "ancho",
        "alto",
        "resolución horizontal",
        "resolucion horizontal",
        "resolución vertical",
        "resolucion vertical",
        "profundidad en bits",
        "compresión",
        "compresion",
        "unidad de resolución",
        "unidad de resolucion",
        "representación del color",
        "representacion del color",
        "bits comprimidos/píxel",
        "bits comprimidos/pixel"
      ]);

      lines.forEach(line => {
        const clean = line.replace(/\s+\/\s*$/, "").trim();
        if (!clean) return;

        if (!parsed.format && /FORMATO/i.test(clean)) {
          parsed.format = clean.replace(/FORMATO\s*/i, "Formato ").replace(/\s+/g, " ").trim();
          return;
        }
        if (!parsed.background && /FONDO/i.test(clean)) {
          parsed.background = clean.replace(/FONDO\s*/i, "").replace(/[/:]+$/g, "").trim() || clean;
          return;
        }
        if (!parsed.shadow && /SOMBRA/i.test(clean)) {
          parsed.shadow = clean.replace(/SOMBRA\s*/i, "").trim() || clean;
          return;
        }
        if (!parsed.view && /VISTA/i.test(clean)) {
          parsed.view = clean.replace(/VISTA\s*/i, "").trim() || clean;
          return;
        }

        const match = clean.match(/^([^:]+):\s*(.*)$/);
        if (match) {
          const key = match[1].trim();
          const value = match[2].trim();
          const normalizedKey = normalizeText(key);
          if (knownDetailKeys.has(normalizedKey) || value) parsed.details[key] = value || "-";
        }
      });
      return parsed;
    }

    function renderSkuCard(record, row) {
      const skuImgs = getCaseImages(record.id).filter(img => normalizeSku(img.sku) === normalizeSku(row.sku));
      const tags = skuImgs.length ? skuImgs.map(img => {

        return `<span class="view-tag ${cls}">${escapeHtml(img.folderPath ? `${img.folderPath}/${img.view}` : img.view)} · ${escapeHtml(img.status)}</span>`;
      }).join("") : `<span class="view-tag">Sin imágenes</span>`;
      return `
        <div class="sku-card">

    function canTakeCase(record) {
      if (!currentUser() || currentRole() === ROLES.REVISOR) return false;
      if (record.editor && record.editor !== currentUser() && !isAdmin()) return false;
      return [STATUS.PENDIENTE, STATUS.RECHAZADO, STATUS.TRABAJO].includes(record.estado || STATUS.PENDIENTE);
    }

    async function handleCaseExcel(event) {
      const file = event.target.files?.[0];
      event.target.value = "";
      if (!file) return;
      if (!isReviewer()) return alert("Solo admin o revisores pueden cargar casos.");
      const caseNumber = extractCaseNumber(file.name);
      if (!caseNumber) return alert("No se pudo leer el número de caso desde el nombre del archivo.");
      try {
        const rows = await readWorkbookRows(file);
        if (!rows.length) return alert("Excel sin datos.");
        const skus = rows.map((row, index) => {
          const sku = normalizeSku(row[9]);
          if (!sku) return null;
          return {
            sku,
            brand: String(row[6] || "").trim(),
            subclase: String(row[8] || "").trim(),
            description: String(row[1] || "").trim(),
            line: String(row[0] || "").trim(),
            model: String(row[7] || "").trim(),
            originalRow: index + 2
          };
        }).filter(Boolean);
        if (!skus.length) return alert("No se encontraron SKU en la columna J.");
        const unique = [];
        const seen = new Set();
        skus.forEach(item => { if (!seen.has(item.sku)) { seen.add(item.sku); unique.push(item); } });
        const brands = [...new Set(unique.map(item => item.brand).filter(Boolean).map(normalizeBrand))];
        const now = new Date().toISOString();
        const id = caseNumber;
        const existing = cases.find(c => c.id === id);
        const record = {
          id,
          caseNumber,
          estado: existing?.estado || STATUS.PENDIENTE,
          editor: existing?.editor || "",
          brands,
          skus: unique,
          skuCount: unique.length,
          fileName: file.name,
          createdAt: existing?.createdAt || now,
          createdBy: existing?.createdBy || currentUser(),
          updatedAt: now,
          updatedBy: currentUser(),
          pendingRejected: existing?.pendingRejected || [],
          availableUntil: existing?.availableUntil || ""
        };
        await setDoc(caseRef(id), record, { merge: true });
        selectedWorkId = id;
        toast(`Caso ${caseNumber} cargado (${unique.length} SKU).`);
      } catch (err) {
        console.error(err);
        alert("No se pudo leer el Excel.");
      }
    }

    function extractCaseNumber(fileName) {
      const base = String(fileName || "").replace(/\.[^.]+$/, "");
      const match = base.match(/\d+/);
      return match ? match[0] : "";
    }

    function readWorkbookRows(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: "array" });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
            resolve(matrix.slice(1).filter(row => row.some(cell => String(cell).trim())));
          } catch (err) { reject(err); }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }

    function downloadCaseTemplate() {
      const rows = [["Línea", "Descripción", "¿Fotografiar producto?", "Enviar a post prod", "Set de fotografía", "Pais", "Marca", "Modelo", "Subclase", "SKU", "EAN", "Caso creado"]];
      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Caso");
      XLSX.writeFile(wb, `plantilla_protocolo2_${dateStamp()}.xlsx`);
    }

      await updateDoc(caseRef(id), { editor: currentUser(), estado: STATUS.TRABAJO, takenAt: record.takenAt || now, updatedAt: now, updatedBy: currentUser() });
      selectedUploadId = id;
      activeTab = "upload";
      toast(`Caso ${record.caseNumber} tomado.`);
      refresh();
    }

    async function deleteCase(idRaw) {
      if (!isAdmin()) return;
      const id = decodeURIComponent(idRaw || "");
      const record = cases.find(c => c.id === id);
      if (!record) return;
      if (!confirm(`¿Eliminar caso ${record.caseNumber}?`)) return;
      const imgs = getCaseImages(id);
      for (const img of imgs) {
        if (img.path) await deleteObject(storageRef(storage, img.path)).catch(() => null);
        await deleteDoc(imageRef(img.id)).catch(() => null);
      }
      await deleteDoc(caseRef(id));
      selectedWorkId = "";
      toast("Caso eliminado.");
    }

    function setupDropZone(caseId) {
      const box = document.getElementById("workedDrop");

      box.addEventListener("dragleave", () => box.classList.remove("drag-over"));
      box.addEventListener("drop", e => {
        e.preventDefault();
        box.classList.remove("drag-over");

                const tags = imgs.length ? imgs.map(img => `<span class="view-tag ${img.status === IMG_STATUS.APROBADO ? "view-ok" : img.status === IMG_STATUS.REVISION ? "view-review" : img.status === IMG_STATUS.RECHAZADO ? "view-bad" : ""}">${escapeHtml(img.folderPath ? `${img.folderPath}/${img.view}` : img.view)}</span>`).join("") : `<span class="muted">Sin match</span>`;

    async function handleWorkedUpload(event, caseIdRaw) {
      const files = [...(event.target.files || [])];
      event.target.value = "";
      await processWorkedFiles(decodeURIComponent(caseIdRaw || selectedUploadId || ""), files);
    }

    async function processWorkedFiles(caseId, files) {
      const record = cases.find(c => c.id === caseId);
      if (!record || !files.length) return;
      if (!canOpenUpload(record)) return alert("No puedes subir imágenes en este caso.");
      if (uploadProcessing) return alert("Ya hay una subida en proceso.");

      const skuSet = new Set((record.skus || []).map(row => normalizeSku(row.sku)));
      const parsed = files.map(file => {
        const meta = parseImageFileName(file.name);
        meta.folderPath = getFileFolderPath(file);
        meta.relativePath = String(file.webkitRelativePath || file.name || "");
        meta.key = deliveryKey(meta.sku, meta.view, meta.folderPath);
        return { file, parsed: meta, error: validateUploadFile(file) };
      });

      parsed.forEach(item => {
        if (!item.error && (!item.parsed.sku || !item.parsed.view)) item.error = "Nombre inválido";
        if (!item.error && !skuSet.has(item.parsed.sku)) item.error = "SKU no pertenece al caso";
      });

      const seenKeys = new Set();
      parsed.forEach(item => {
        if (item.error) return;
        if (seenKeys.has(item.parsed.key)) item.error = "SKU_VISTA duplicado en la misma carpeta";
        seenKeys.add(item.parsed.key);
      });

      const errors = parsed.filter(item => item.error);
      if (errors.length) {
        alert(errors.map(item => `${item.parsed.relativePath || item.file.name}: ${item.error}`).join("\n"));
        return;
      }

      uploadProcessing = true;
      try {
        const now = new Date().toISOString();
        for (let i = 0; i < parsed.length; i++) {
          const { file, parsed: meta } = parsed[i];
          await deactivatePreviousActiveRevision(caseId, meta.sku, meta.view, meta.folderPath);
          const imageId = `${caseId}_${meta.folderPath}_${meta.sku}_${meta.view}_${Date.now()}_${i}`.replace(/[^a-zA-Z0-9_-]/g, "_");
          const ext = fileExtension(file.name) || "png";
          const finalName = `${meta.sku}_${meta.view}.${ext}`;
          const folderPart = meta.folderPath ? `${meta.folderPath}/` : "";
          const path = `${STORAGE_ROOT}/trabajado/${caseId}/${folderPart}${imageId}_${safeFileName(finalName)}`;
          const contentType = uploadContentType(file);
          await uploadBytes(storageRef(storage, path), file, { contentType });
          const url = await getDownloadURL(storageRef(storage, path));
          await setDoc(imageRef(imageId), {
            id: imageId,
            caseId,
            caseNumber: record.caseNumber,
            sku: meta.sku,
            view: meta.view,
            folderPath: meta.folderPath || "",
            relativePath: meta.relativePath || file.name,
            fileName: finalName,
            originalName: file.name,
            path,
            url,
            size: file.size,
            type: contentType,
            status: IMG_STATUS.REVISION,
            active: true,
            uploadedAt: now,
            uploadedBy: currentUser(),
            reviewedAt: "",
            reviewedBy: "",
            rejectReason: ""
          });
        }

        const expectedViews = mergeExpectedViews(record.expectedViews || [], parsed.map(item => item.parsed));
        const pendingRejected = removePendingForUploads(record.pendingRejected || [], parsed.map(item => item.parsed));
        await updateDoc(caseRef(caseId), { estado: STATUS.REVISION, expectedViews, pendingRejected, updatedAt: now, updatedBy: currentUser() });
        selectedReviewId = caseId;
        toast(`${parsed.length} imagen(es) subidas a revisión.`);
      } catch (err) {
        console.error(err);
        alert("No se pudo subir una o más imágenes.");
      } finally {
        uploadProcessing = false;
      }
    }

    function removePendingForUploads(pending, uploaded) {
      const uploadedKeys = new Set(uploaded.map(item => deliveryKey(item.sku, item.view, item.folderPath || "")));
      return pending.filter(item => !uploadedKeys.has(deliveryKey(item.sku, item.view, item.folderPath || "")));
    }

    function mergeExpectedViews(current, uploaded) {
      const map = new Map();
      (current || []).forEach(item => {
        const key = deliveryKey(item.sku, item.view, item.folderPath || "");
        if (item.sku && item.view) map.set(key, {
          sku: normalizeSku(item.sku),
          view: String(item.view || ""),
          folderPath: normalizeFolderPath(item.folderPath || "")
        });
      });
      (uploaded || []).forEach(item => {
        const key = deliveryKey(item.sku, item.view, item.folderPath || "");
        if (item.sku && item.view) map.set(key, {
          sku: normalizeSku(item.sku),
          view: String(item.view || ""),
          folderPath: normalizeFolderPath(item.folderPath || "")
        });
      });
      return [...map.values()].sort((a, b) => {
        return String(a.folderPath || "").localeCompare(String(b.folderPath || ""), undefined, { numeric: true })
          || normalizeSku(a.sku).localeCompare(normalizeSku(b.sku), undefined, { numeric: true })
          || String(a.view).localeCompare(String(b.view), undefined, { numeric: true });
      });
    }

    function removeExpectedView(current, img) {
      const key = imageDeliveryKey(img);
      return (current || []).filter(item => deliveryKey(item.sku, item.view, item.folderPath || "") !== key);
    }

    async function deactivatePreviousActiveRevision(caseId, sku, view, folderPath = "") {
      const key = deliveryKey(sku, view, folderPath);
      const previous = images.filter(img => img.caseId === caseId && imageDeliveryKey(img) === key && img.active !== false && img.status !== IMG_STATUS.APROBADO);
      for (const img of previous) await updateDoc(imageRef(img.id), { active: false, replacedAt: new Date().toISOString(), replacedBy: currentUser() }).catch(() => null);
    }

    function parseImageFileName(name) {
      const base = String(name || "").replace(/\.[^.]+$/, "").trim();
      const match = base.match(/^(.+)_([^_]+)$/);
      if (!match) return { sku: "", view: "" };
      return { sku: normalizeSku(match[1]), view: String(match[2] || "").trim().toUpperCase() };
    }
    function fileExtension(name = "") { const parts = String(name).split("."); return parts.length > 1 ? parts.pop().toLowerCase() : ""; }
    function uploadContentType(file) {
      const type = String(file.type || "").toLowerCase();
      if (ALLOWED_UPLOAD_MIME_TYPES.includes(type)) return type;
      const ext = fileExtension(file.name);
      const byExt = { jpg: "image/jpeg", jpeg: "image/jpeg", png: "image/png", webp: "image/webp", avif: "image/avif" };
      return byExt[ext] || "application/octet-stream";
    }
    function validateUploadFile(file) {
      const ext = fileExtension(file.name);
      const type = uploadContentType(file);
      if (!ALLOWED_UPLOAD_EXTENSIONS.includes(ext) && !ALLOWED_UPLOAD_MIME_TYPES.includes(type)) return "Formato no permitido";
      if (file.size > MAX_UPLOAD_SIZE_BYTES) return "Archivo supera 15 MB";
      return "";
    }

        map.get(sku).push(img);
      });
      return [...map.entries()].map(([sku, items]) => ({
        sku,
        items: items.sort((a, b) => String(a.view).localeCompare(String(b.view), undefined, { numeric: true }))
      }));

    function renderReviewImageCard(img) {
      return `
        <div class="image-card">
          <div class="image-card-head">
            <label><input type="checkbox" class="review-check" value="${escapeHtml(img.id)}" checked> Seleccionar</label>

            <img src="${escapeHtml(img.url)}" alt="${escapeHtml(img.fileName)}">
          </div>
          <div class="image-card-body">

            <div class="reject-box"><textarea id="reject_${escapeHtml(img.id)}" placeholder="Motivo rechazo"></textarea></div>
            <div class="actions">
              <button class="btn btn-primary btn-small" onclick="approveImage('${encodeForInline(img.id)}')">Aceptar</button>

            </div>
          </div>
