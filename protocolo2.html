    }

    function handleReviewImageZoom(event) {
      const frame = event.currentTarget;
      if (!frame) return;

      const img = frame.querySelector("img");
      const zoomUrl = frame.dataset.zoomUrl || img?.src || "";
      if (zoomUrl) frame.style.setProperty("--zoom-image", `url("${zoomUrl}")`);

      const rect = frame.getBoundingClientRect();
      const pointerX = Math.max(0, Math.min(rect.width, event.clientX - rect.left));
      const pointerY = Math.max(0, Math.min(rect.height, event.clientY - rect.top));

      let renderWidth = rect.width;
      let renderHeight = rect.height;
      let offsetX = 0;
      let offsetY = 0;

      if (img && img.naturalWidth && img.naturalHeight) {
        const frameRatio = rect.width / rect.height;
        const imageRatio = img.naturalWidth / img.naturalHeight;
        if (imageRatio > frameRatio) {
          renderWidth = rect.width;
          renderHeight = rect.width / imageRatio;
          offsetY = (rect.height - renderHeight) / 2;
        } else {
          renderHeight = rect.height;
          renderWidth = rect.height * imageRatio;
          offsetX = (rect.width - renderWidth) / 2;
        }
      }

      const imageX = Math.max(0, Math.min(renderWidth, pointerX - offsetX));
      const imageY = Math.max(0, Math.min(renderHeight, pointerY - offsetY));
      const xRatio = renderWidth ? imageX / renderWidth : 0.5;
      const yRatio = renderHeight ? imageY / renderHeight : 0.5;

      const zoomScale = 4.2;
      const lensSize = Math.min(340, Math.max(230, rect.width * 0.58));
      const bgWidth = renderWidth * zoomScale;
      const bgHeight = renderHeight * zoomScale;
      const bgX = (lensSize / 2) - (xRatio * bgWidth);
      const bgY = (lensSize / 2) - (yRatio * bgHeight);

      frame.style.setProperty("--zoom-size", `${lensSize}px`);
      frame.style.setProperty("--zoom-left", `${pointerX}px`);
      frame.style.setProperty("--zoom-top", `${pointerY}px`);
      frame.style.setProperty("--zoom-bg-size", `${bgWidth}px ${bgHeight}px`);
      frame.style.setProperty("--zoom-bg-position", `${bgX}px ${bgY}px`);
    }

    function resetReviewImageZoom(event) {
      const frame = event.currentTarget;
      if (!frame) return;
      frame.style.setProperty("--zoom-left", "50%");
      frame.style.setProperty("--zoom-top", "50%");
      frame.style.setProperty("--zoom-bg-position", "50% 50%");
    }

    function toggleAllReviewImages(checked) {
      document.querySelectorAll(".review-check").forEach(input => { input.checked = checked; });
    }

    async function approveSelectedReview(caseIdRaw) {
      const ids = [...document.querySelectorAll(".review-check:checked")].map(input => input.value);
      if (!ids.length) return alert("No hay imágenes seleccionadas.");
      for (const id of ids) await approveImage(encodeURIComponent(id), true);
      await recomputeCaseState(decodeURIComponent(caseIdRaw || ""));
      toast(`${ids.length} imagen(es) aceptadas.`);
    }

    async function approveImage(idRaw, silent = false) {
      const id = decodeURIComponent(idRaw || "");
      const img = images.find(item => item.id === id);
      if (!img || !isReviewer()) return;
      const now = new Date().toISOString();
      await updateDoc(imageRef(id), { status: IMG_STATUS.APROBADO, active: true, reviewedAt: now, reviewedBy: currentUser(), rejectReason: "" });
      await recomputeCaseState(img.caseId);
      if (!silent) toast("Imagen aceptada.");
    }

    async function rejectImage(idRaw) {
      const id = decodeURIComponent(idRaw || "");
      const img = images.find(item => item.id === id);
      if (!img || !isReviewer()) return;
      const reason = document.getElementById(`reject_${id}`)?.value.trim() || "Rechazado sin motivo";
      const now = new Date().toISOString();
      await updateDoc(imageRef(id), { status: IMG_STATUS.RECHAZADO, active: false, reviewedAt: now, reviewedBy: currentUser(), rejectReason: reason });
      const record = cases.find(c => c.id === img.caseId);
      const pending = upsertPending(record?.pendingRejected || [], { sku: img.sku, view: img.view, folderPath: img.folderPath || "", reason, rejectedAt: now, rejectedBy: currentUser() });
      await updateDoc(caseRef(img.caseId), { estado: STATUS.RECHAZADO, pendingRejected: pending, updatedAt: now, updatedBy: currentUser() });
      toast("Imagen rechazada. Vuelve al caso del post.");
    }

    async function discardImage(idRaw) {
      const id = decodeURIComponent(idRaw || "");
      const img = images.find(item => item.id === id);
      if (!img || !isReviewer()) return;
      const reason = document.getElementById(`reject_${id}`)?.value.trim() || "Descartado";
      const now = new Date().toISOString();
      await updateDoc(imageRef(id), { status: IMG_STATUS.DESCARTADO, active: false, reviewedAt: now, reviewedBy: currentUser(), rejectReason: reason });
      const record = cases.find(c => c.id === img.caseId);
      if (record?.expectedViews?.length) await updateDoc(caseRef(img.caseId), { expectedViews: removeExpectedView(record.expectedViews, img), updatedAt: now, updatedBy: currentUser() }).catch(() => null);
      await recomputeCaseState(img.caseId);
      toast("Imagen descartada.");
    }

    function upsertPending(pending, item) {
      const key = deliveryKey(item.sku, item.view, item.folderPath || "");
      const clean = pending.filter(p => deliveryKey(p.sku, p.view, p.folderPath || "") !== key);
      clean.push({
        sku: normalizeSku(item.sku),
        view: String(item.view),
        folderPath: normalizeFolderPath(item.folderPath || ""),
        reason: item.reason || "",
        rejectedAt: item.rejectedAt || new Date().toISOString(),
        rejectedBy: item.rejectedBy || currentUser()
      });
      return clean;
    }

    async function recomputeCaseState(caseId) {
      const record = cases.find(c => c.id === caseId);
      if (!record) return;
      const pending = record.pendingRejected || [];
      const rev = getRevisionImages(caseId).filter(img => img.status === IMG_STATUS.REVISION);
      const approved = getApprovedImages(caseId);
      let estado = record.estado || STATUS.PENDIENTE;
      if (rev.length) estado = STATUS.REVISION;
      else if (pending.length) estado = STATUS.RECHAZADO;
      else if (isCaseComplete(record, approved)) estado = STATUS.COMPLETADO;
      else if (record.editor) estado = STATUS.TRABAJO;
      else estado = STATUS.PENDIENTE;
      const patch = { estado, updatedAt: new Date().toISOString(), updatedBy: currentUser() };
      if (estado === STATUS.COMPLETADO && !record.availableUntil) patch.availableUntil = addDaysIso(7);
      await updateDoc(caseRef(caseId), patch).catch(() => null);
    }

    function getExpectedItems(record) {
      const fromCase = Array.isArray(record.expectedViews) ? record.expectedViews.filter(item => item.sku && item.view) : [];
      if (fromCase.length) return mergeExpectedViews([], fromCase);
      const fromImages = getCaseImages(record.id)
        .filter(img => img.status !== IMG_STATUS.DESCARTADO)
        .map(img => ({ sku: img.sku, view: img.view, folderPath: img.folderPath || "" }));
      return mergeExpectedViews([], fromImages);
    }

    function isCaseComplete(record, approvedImages = getApprovedImages(record.id)) {
      const expected = getExpectedItems(record);
      if (!expected.length || !approvedImages.length) return false;
      const approvedKeys = new Set(approvedImages.map(imageDeliveryKey));
      return expected.every(item => approvedKeys.has(deliveryKey(item.sku, item.view, item.folderPath || "")))
        && !(record.pendingRejected || []).length
        && !getRevisionImages(record.id).length;
    }

    function getMasterCases() {
      const terms = splitSearchTerms(masterSearch);
      return cases.filter(record => {
        const statusOk = [STATUS.COMPLETADO, STATUS.DESCARGADO].includes(record.estado);
        if (!statusOk) return false;
        return caseMatchesTerms(record, terms);
      });
    }

    function renderMaster() {
      const list = getMasterCases();
      document.getElementById("viewMaster").innerHTML = `
        <div class="master-panel">
          <div class="panel-title">
            <span>Master</span>
            <span class="pill status">${list.length}</span>
          </div>
          <div class="master-filter-bar">
            <input class="search-input" value="${escapeHtml(masterSearch)}" oninput="setMasterSearch(this.value)" placeholder="Buscar caso o SKU(s) separados por espacio/coma" />
            <button class="btn btn-soft" onclick="exportMasterExcel()">Exportar Excel</button>
            ${isAdmin() ? `<button class="btn btn-red" onclick="cleanExpiredFiles()">Limpiar vencidos</button>` : ""}
          </div>
          <div class="match-table-wrap">
            <table class="table">
              <thead><tr><th>Caso</th><th>Marca</th><th>Post</th><th>SKU</th><th>Imágenes</th><th>Disponible hasta</th><th>Acciones</th></tr></thead>
              <tbody>
                ${list.length ? list.map(record => {
                  const approved = getApprovedImages(record.id).length;
                  return `<tr>
                    <td><strong>${escapeHtml(record.caseNumber)}</strong><br>${statusPill(record.estado)}</td>
                    <td>${escapeHtml((record.brands || []).join(", "))}</td>
                    <td>${escapeHtml(record.editor || "")}</td>
                    <td>${(record.skus || []).length}</td>
                    <td>${approved} / ${getExpectedItems(record).length || approved}</td>
                    <td>${formatDate(record.availableUntil)}</td>
                    <td><div class="actions">
                      <button class="btn btn-primary btn-small" onclick="downloadCaseZip('${encodeForInline(record.id)}')">Descargar ZIP</button>
                      <button class="btn btn-soft btn-small" onclick="openHistoryViewer('${encodeForInline(record.id)}')">Ver historial</button>
                    </div></td>
                  </tr>`;
                }).join("") : `<tr><td colspan="7" class="empty">Sin casos en master.</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function setMasterSearch(value) { masterSearch = value; renderMaster(); }

    async function downloadCaseZip(caseIdRaw) {
      const caseId = decodeURIComponent(caseIdRaw || "");
      const record = cases.find(c => c.id === caseId);
      if (!record) return;
      const approved = getApprovedImages(caseId).sort((a, b) => String(a.folderPath || "").localeCompare(String(b.folderPath || ""), undefined, { numeric: true }) || normalizeSku(a.sku).localeCompare(normalizeSku(b.sku), undefined, { numeric: true }) || String(a.view).localeCompare(String(b.view), undefined, { numeric: true }));
      if (!approved.length) return alert("No hay imágenes aceptadas para descargar.");
      const zip = new JSZip();
      for (const img of approved) {
        try {
          const res = await fetch(img.url);
          const blob = await res.blob();
          const ext = fileExtension(img.fileName) || "png";
          const folder = normalizeFolderPath(img.folderPath || "");
          const zipName = `${safeFileName(img.sku)}_${safeFileName(img.view)}.${ext}`;
          zip.file(`${folder ? `${folder}/` : ""}${zipName}`, blob);
        } catch (err) { console.error(err); }
      }
      const blob = await zip.generateAsync({ type: "blob" });
      saveAs(blob, `caso_${safeFileName(record.caseNumber)}_${dateStamp()}.zip`);
      const until = record.availableUntil || addDaysIso(7);
      await updateDoc(caseRef(caseId), { estado: STATUS.DESCARGADO, downloadedAt: new Date().toISOString(), downloadedBy: currentUser(), availableUntil: until, updatedAt: new Date().toISOString(), updatedBy: currentUser() });
    }

    function openHistoryViewer(caseIdRaw) {
      const caseId = decodeURIComponent(caseIdRaw || "");
      const record = cases.find(c => c.id === caseId);
      if (!record) return;
      historyTab = "accepted";
      renderHistoryModal(record);
    }

    function renderHistoryModal(record) {
      const modal = document.getElementById("historyModal");
      const all = getCaseImages(record.id);
      const groups = {
        accepted: all.filter(img => img.status === IMG_STATUS.APROBADO),
        rejected: all.filter(img => img.status === IMG_STATUS.RECHAZADO),
        discarded: all.filter(img => img.status === IMG_STATUS.DESCARTADO),
        review: all.filter(img => img.status === IMG_STATUS.REVISION)
      };
      const labels = { accepted: "Aceptado", rejected: "Rechazado", discarded: "Descartado", review: "En revisión" };
      modal.classList.remove("hidden");
      modal.innerHTML = `
        <div class="modal-content">
          <div class="modal-head">
            <strong>Historial caso ${escapeHtml(record.caseNumber)}</strong>
            <button class="modal-close" onclick="closeHistoryModal()">×</button>
          </div>
          <div class="modal-body">
            <div class="history-tabs">
              ${Object.keys(groups).map(key => `<button class="tab ${historyTab === key ? "active" : ""}" onclick="setHistoryTab('${key}', '${encodeForInline(record.id)}')">${labels[key]} (${groups[key].length})</button>`).join("")}
            </div>
            <div class="history-section">
              ${groups[historyTab].length ? `<div class="image-grid">${groups[historyTab].map(renderHistoryImageCard).join("")}</div>` : `<div class="empty">Sin imágenes.</div>`}
            </div>
          </div>
        </div>
      `;
    }

    function renderHistoryImageCard(img) {
      return `
        <div class="image-card">
          <div class="image-card-head"><span>${escapeHtml(img.sku)}_${escapeHtml(img.view)}</span>${statusPill(img.status)}</div>
          <img src="${escapeHtml(img.url)}" alt="${escapeHtml(img.fileName)}" onclick="openImageModal('${encodeForInline(img.url)}')">
          <div class="image-card-body">
            <div class="muted">Subido: ${formatDate(img.uploadedAt)} · ${escapeHtml(img.uploadedBy || "")}</div>
            <div class="muted">Revisión: ${formatDate(img.reviewedAt)} · ${escapeHtml(img.reviewedBy || "")}</div>
            ${img.rejectReason ? `<div>${escapeHtml(img.rejectReason)}</div>` : ""}
          </div>
        </div>`;
    }

    function setHistoryTab(tab, caseIdRaw) {
      historyTab = tab;
      const record = cases.find(c => c.id === decodeURIComponent(caseIdRaw || ""));
      if (record) renderHistoryModal(record);
    }
    function closeHistoryModal() { document.getElementById("historyModal").classList.add("hidden"); }

    async function cleanExpiredFiles() {
      if (!isAdmin()) return;
      const now = new Date();
      const expired = cases.filter(c => c.availableUntil && new Date(c.availableUntil) < now);
      if (!expired.length) return alert("No hay casos vencidos.");
      if (!confirm(`Se eliminarán imágenes de ${expired.length} caso(s) vencidos. ¿Continuar?`)) return;
      for (const record of expired) {
        const imgs = getCaseImages(record.id);
        for (const img of imgs) {
          if (img.path) await deleteObject(storageRef(storage, img.path)).catch(() => null);
          await updateDoc(imageRef(img.id), { url: "", path: "", fileDeletedAt: new Date().toISOString(), fileDeletedBy: currentUser() }).catch(() => null);
        }
      }
      toast("Limpieza completada.");
    }

    function renderSpecs() {
      document.getElementById("viewSpecs").innerHTML = `
        ${isReviewer() ? `
        <div class="manual-panel">
          <div class="manual-title"><h2>Especificaciones</h2></div>
          <div class="manual-grid">
            <div class="field"><label>Marca</label><input id="specBrand" placeholder="Marca" /></div>
            <div class="field" style="grid-column: span 2;"><label>Texto</label><textarea id="specNotes" placeholder="Pega especificaciones. Ej: FORMATO 1500X1500, FONDO BLANCO, SOMBRA TENUE..."></textarea></div>
          </div>
          <label class="upload-box" for="specImagesInput" style="margin-top:12px;">
            <strong>Agregar imágenes de referencia</strong>
            <small>Opcional. Se guardan por marca.</small>
          </label>
          <input id="specImagesInput" class="input-file" type="file" accept=".jpg,.jpeg,.png,.webp,.avif" multiple />
          <div class="actions"><button class="btn btn-primary" onclick="saveSpec()">Guardar especificación</button></div>
        </div>` : ""}
        <div class="master-panel">
          <div class="panel-title"><span>Especificaciones cargadas</span><span class="pill status">${specs.length}</span></div>
          <div class="detail-content">
            ${specs.length ? `<div class="spec-list">${specs.map(spec => `
              <div class="spec-card">
                <div class="section-head">
                  <div><h3>${escapeHtml(spec.brand)}</h3><small>${formatDate(spec.updatedAt)}</small></div>
                  ${isReviewer() ? `<div class="actions"><button class="btn btn-soft btn-small" onclick="editSpec('${encodeForInline(spec.id)}')">Editar</button><button class="btn btn-red btn-small" onclick="deleteSpec('${encodeForInline(spec.id)}')">Eliminar</button></div>` : ""}
                </div>
                ${renderSpecContent(spec)}
                ${spec.images?.length ? `<div class="spec-images">${spec.images.map(img => `<img src="${escapeHtml(img.url)}" onclick="openImageModal('${encodeForInline(img.url)}')">`).join("")}</div>` : ""}
              </div>`).join("")}</div>` : `<div class="empty">Sin especificaciones.</div>`}
          </div>
        </div>
      `;
    }

    function editSpec(idRaw) {
      const spec = specs.find(s => s.id === decodeURIComponent(idRaw || ""));
      if (!spec) return;
      document.getElementById("specBrand").value = spec.brand || "";
      document.getElementById("specNotes").value = spec.notes || "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function saveSpec() {
      if (!isReviewer()) return;
      const brand = normalizeBrand(document.getElementById("specBrand")?.value);
      const notes = document.getElementById("specNotes")?.value.trim() || "";
      const files = [...(document.getElementById("specImagesInput")?.files || [])];
      if (!brand) return alert("Ingresa una marca.");
      const id = safeFileName(brand);
      const existing = specs.find(s => s.id === id) || {};
      const now = new Date().toISOString();
      const uploaded = [];
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const err = validateUploadFile(file);
        if (err) return alert(`${file.name}: ${err}`);
        const imageId = `${id}_${Date.now()}_${i}`;
        const path = `${STORAGE_ROOT}/especificaciones/${id}/${imageId}_${safeFileName(file.name)}`;
        await uploadBytes(storageRef(storage, path), file, { contentType: uploadContentType(file) });
        const url = await getDownloadURL(storageRef(storage, path));
        uploaded.push({ id: imageId, name: file.name, path, url, uploadedAt: now, uploadedBy: currentUser() });
      }
      await setDoc(specRef(id), {
        id,
        brand,
        notes,
        parsed: parseSpecNotes(notes),
        images: [...(existing.images || []), ...uploaded],
        createdAt: existing.createdAt || now,
        createdBy: existing.createdBy || currentUser(),
        updatedAt: now,
        updatedBy: currentUser()
      }, { merge: true });
      document.getElementById("specBrand").value = "";
      document.getElementById("specNotes").value = "";
      document.getElementById("specImagesInput").value = "";
      toast("Especificación guardada.");
    }

    async function deleteSpec(idRaw) {
      if (!isReviewer()) return;
      const id = decodeURIComponent(idRaw || "");
      const spec = specs.find(s => s.id === id);
      if (!spec) return;
      if (!confirm(`¿Eliminar especificación ${spec.brand}?`)) return;
      for (const img of spec.images || []) if (img.path) await deleteObject(storageRef(storage, img.path)).catch(() => null);
      await deleteDoc(specRef(id));
      toast("Especificación eliminada.");
    }

    function exportMasterExcel() {
      const rows = [["CASO", "ESTADO", "POST", "MARCAS", "SKU", "IMAGENES_ACEPTADAS", "DESCARGADO", "DISPONIBLE_HASTA"]];
      getMasterCases().forEach(record => rows.push([
        record.caseNumber,
        record.estado,
        record.editor || "",
        (record.brands || []).join(" | "),
        (record.skus || []).length,
        getApprovedImages(record.id).length,
        record.downloadedAt || "",
        record.availableUntil || ""
      ]));
      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Master protocolo 2");
      XLSX.writeFile(wb, `master_protocolo2_${dateStamp()}.xlsx`);
    }

    function openImageModal(urlRaw) {
      const url = decodeURIComponent(urlRaw || "");
      if (!url) return;
      const modal = document.getElementById("imageModal");
      modal.innerHTML = `<img src="${escapeHtml(url)}" alt="Imagen">`;
      modal.classList.remove("hidden");
    }
    function closeImageModal() {
      const modal = document.getElementById("imageModal");
      modal.classList.add("hidden");
      modal.innerHTML = "";
    }

    function toast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.style.display = "block";
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => { el.style.display = "none"; }, 2600);
    }

    window.toggleTheme = toggleTheme;
    window.handleUserChange = handleUserChange;
    window.setTab = setTab;
    window.selectWorkCase = selectWorkCase;
    window.setWorkSearch = setWorkSearch;
    window.handleCaseExcel = handleCaseExcel;
    window.downloadCaseTemplate = downloadCaseTemplate;
    window.takeCase = takeCase;
    window.openUploadForCase = openUploadForCase;
    window.deleteCase = deleteCase;
    window.selectUploadCase = selectUploadCase;
    window.handleWorkedUpload = handleWorkedUpload;
    window.selectReviewCase = selectReviewCase;
    window.approveImage = approveImage;
    window.rejectImage = rejectImage;
    window.discardImage = discardImage;
    window.approveSelectedReview = approveSelectedReview;
    window.toggleAllReviewImages = toggleAllReviewImages;
    window.handleReviewImageZoom = handleReviewImageZoom;
    window.resetReviewImageZoom = resetReviewImageZoom;
    window.setMasterSearch = setMasterSearch;
    window.downloadCaseZip = downloadCaseZip;
    window.openHistoryViewer = openHistoryViewer;
    window.closeHistoryModal = closeHistoryModal;
    window.setHistoryTab = setHistoryTab;
    window.cleanExpiredFiles = cleanExpiredFiles;
    window.saveSpec = saveSpec;
    window.editSpec = editSpec;
    window.deleteSpec = deleteSpec;
    window.exportMasterExcel = exportMasterExcel;
    window.openImageModal = openImageModal;
    window.closeImageModal = closeImageModal;

    loadTheme();
    initFirebase();
    initUser();
  </script>
</body>
